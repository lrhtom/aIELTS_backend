[pytest]
DJANGO_SETTINGS_MODULE = backend.settings
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 默认只跑 unit 层（无 DB、无网络），保持 pre-commit 快速反馈
addopts =
    -ra
    --strict-markers
    --tb=short
    -p no:cacheprovider

testpaths = tests

markers =
    unit: 纯函数 / mock，无 DB、无网络
    integration: 走真实 DB（MySQL test schema）
    db: 需要 DB 访问（pytest-django 会自动加 db marker，这里冗余声明）
    slow: 单条 > 1s
    live_ai: 真实调 AI 上游（CI 默认跳过；本地手动 `-m live_ai` 触发）
    rate_limit: 触发 Redis 限流逻辑
